name: FinSky Multi-OS Compatibility Test

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Test compatibility'
        required: false
        default: 'Check compatibility after update'

jobs:
  compatibility-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test Standard Pip Installation
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Test Run (Standard)
        shell: bash
        env:
          TERM: xterm
          FORCE_COLOR: "1"
        run: python app/main.py --help

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Test uv Sync & Logic
        shell: bash
        env:
          TERM: xterm
          FORCE_COLOR: "1"
        run: |
          uv sync
          uv run python -c "import tldextract; print('tldextract loaded')"
          uv run python -c "from rich.console import Console; Console().print('[bold]FinSky Engine Loaded[/]')"